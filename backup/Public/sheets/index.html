<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gateloga | Database Routing</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: 'Inter', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .routing-indicator {
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.85rem;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
<script>
  // Insert the direct link to the published Google Sheet here
  const DATABASE_URL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit";
  
  window.onload = () => {
    setTimeout(() => {
      window.location.replace(DATABASE_URL);
    }, 800); // Slight delay to ensure the UI paints before routing
  };
</script>
</head>
<body>
  <div class="routing-indicator">Establishing Secure Connection...</div>
</body>
</html>
